server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: enterprise-iam
  datasource:
    url: jdbc:mysql://localhost:3306/enterprise_iam?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: IAMHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  cache:
    type: redis
    redis:
      time-to-live: 600000

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
    issuer: enterprise-iam
  security:
    max-failed-attempts: 5
    lock-duration-minutes: 30
    email-token-expiry-hours: 24
    password-reset-token-expiry-hours: 1
  mail:
    from: noreply@enterprise-iam.com
    from-name: Enterprise IAM
    base-url: http://localhost:8080

logging:
  level:
    com.iam: DEBUG
    org.springframework.security: INFO
